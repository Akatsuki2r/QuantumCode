name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: quantumn
            artifact_path: target/x86_64-unknown-linux-gnu/release/quantumn
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: quantumn
            artifact_path: target/aarch64-unknown-linux-gnu/release/quantumn
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: quantumn
            artifact_path: target/x86_64-apple-darwin/release/quantumn
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: quantumn
            artifact_path: target/aarch64-apple-darwin/release/quantumn
          # Windows
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact_name: quantumn.exe
            artifact_path: target/x86_64-pc-windows-gnu/release/quantumn.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install MinGW (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive
        run: |
          cd artifacts
          for dir in */; do
            dir=${dir%/}
            if [[ "$dir" == *"windows"* ]]; then
              zip -r "../${dir}.zip" "$dir"
            else
              tar -czf "../${dir}.tar.gz" "$dir"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
            *.zip
          body: |
            ## Quantumn Code ${{ github.ref_name }}

            ### Installation

            Download the binary for your platform:

            | Platform | Download |
            |----------|----------|
            | Linux x64 | `quantumn-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux ARM64 | `quantumn-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Intel | `quantumn-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `quantumn-aarch64-apple-darwin.tar.gz` |
            | Windows | `quantumn-x86_64-pc-windows-gnu.zip` |

            ### Quick Install (Linux/macOS)

            ```bash
            # Download and extract
            curl -sL https://github.com/Akatsuki2r/QuantumCode/releases/download/${{ github.ref_name }}/quantumn-$(uname -m)-unknown-linux-gnu.tar.gz | tar xz

            # Move to PATH
            sudo mv quantumn /usr/local/bin/
            ```

            ### What's Changed
            See commit history for details.